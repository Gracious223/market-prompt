name: Generate daily brief (Market Prompt)

# Generates a fresh, web-grounded issue every day at 07:00 Europe/London and
# commits it. Requires repo secret ANTHROPIC_API_KEY. Trigger manually from the
# Actions tab (workflow_dispatch) to test any time.
#
# GitHub cron is UTC-only and can't follow daylight saving, and scheduled runs
# can fire hours late, so we fire at both 06:00 and 07:00 UTC and the gate below
# proceeds on the first fire at/after 07:00 London with no issue yet for today —
# delay-tolerant, idempotent, true 7am-or-later London year-round (BST and GMT).

on:
  schedule:
    - cron: '0 6 * * *'     # 07:00 London during BST (summer)
    - cron: '0 7 * * *'     # 07:00 London during GMT (winter)
  workflow_dispatch:

# Future-proof against the Node 20 runner deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write          # commit/push the generated issue
  id-token: write          # claude-code-action OIDC + Pages deploy
  pull-requests: write     # required by claude-code-action
  pages: write             # deploy to GitHub Pages from this run

# Share the Pages deploy lane with deploy.yml so the two never clash.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # A workflow-token push doesn't trigger deploy.yml, so this job deploys
    # the freshly generated site itself.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Gate — 07:00+ London, once per day (manual runs always proceed)
        id: gate
        run: |
          today="$(TZ=Europe/London date +%F)"
          hour="$((10#$(TZ=Europe/London date +%H)))"   # 10# forces base-10 (no octal 08/09)
          echo "today=$today" >> "$GITHUB_OUTPUT"
          # Scheduled crons can fire hours late, so don't require an exact hour.
          # Proceed on the first run at/after 07:00 London that finds no issue for
          # today yet; later/duplicate fires see the committed file and skip.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ -f "newsletters/${today}.html" ]; then
            echo "Issue for ${today} already exists — nothing to do."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          elif [ "$hour" -ge 7 ]; then
            echo "After 07:00 London (now $(TZ=Europe/London date +%H:%M)), no issue yet — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Before 07:00 London (now $(TZ=Europe/London date +%H:%M)); skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate the brief with Claude
        if: steps.gate.outputs.proceed == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Today's date is ${{ steps.gate.outputs.today }}.
            Read .github/newsletter-prompt.md and follow it exactly to produce
            newsletters/${{ steps.gate.outputs.today }}.html. Use WebSearch to
            ground every story in a real, recent source (always include The
            Rundown AI and The Rundown Tech among the feeds you scan), attribute
            and link each story, and match the structure of the most recent file
            already in the newsletters/ folder.
          claude_args: |
            --max-turns 40
            --model claude-sonnet-4-6
            --allowedTools WebSearch,WebFetch,Read,Glob,Write

      # Generation can fail transiently (API overload, flaky web search) and exit
      # without writing the file. Fail loudly here rather than committing index
      # churn under a misleading "Add Market Prompt" message and reporting success.
      - name: Verify the issue was actually generated
        if: steps.gate.outputs.proceed == 'true'
        run: |
          f="newsletters/${{ steps.gate.outputs.today }}.html"
          if [ ! -f "$f" ]; then
            echo "::error::Generation produced no $f — failing instead of committing an empty issue. Re-run to retry."
            exit 1
          fi
          echo "✓ $f was created."

      - name: Rebuild index + article pages
        if: steps.gate.outputs.proceed == 'true'
        run: python3 build.py

      - name: Commit the new issue
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletters/*.html index.html
          if git diff --cached --quiet; then
            echo "No new issue generated — nothing to commit."
          else
            git commit -m "Add Market Prompt — ${{ steps.gate.outputs.today }}"
            REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
            # Rebase on any concurrent pushes so the daily run never fails on a race.
            git pull --rebase "$REMOTE" main || true
            git push "$REMOTE" HEAD:main
          fi

      # The bot push above can't trigger deploy.yml (workflow-token pushes don't
      # start new workflows), so publish the freshly built site from this run.
      - name: Configure Pages
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.gate.outputs.proceed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      # Email the day's issue to subscribers (Resend). Skips itself cleanly
      # until RESEND_API_KEY / RESEND_AUDIENCE_ID / MP_FROM secrets are set.
      - name: Email the issue to subscribers
        if: steps.gate.outputs.proceed == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          MP_FROM: ${{ secrets.MP_FROM }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: python3 send_email.py "${{ steps.gate.outputs.today }}"
