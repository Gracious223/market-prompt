name: Deploy Market Prompt to GitHub Pages

# Builds the site (python3 build.py) and deploys it via GitHub Pages.
# Requires Settings → Pages → "Build and deployment" → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Future-proof against the Node 20 runner deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false        # never try to init the stray nested clone
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build site
        run: python3 build.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
